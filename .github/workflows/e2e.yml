name: E2E (mayapy)

# End-to-end tests that run inside a real Maya standalone interpreter.
# Uses the tahv/mayapy Docker image which ships /usr/autodesk/maya/bin/mayapy
# and exposes it as both `mayapy` and `python` on PATH.
#
# References:
#   https://hub.docker.com/r/tahv/mayapy
#   https://github.com/tahv/docker-mayapy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: E2E mayapy ${{ matrix.maya-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Map Maya version -> Python version (for reference in logs only)
        include:
          - maya-version: "2025"
            python-version: "3.11"
          - maya-version: "2024"
            python-version: "3.10"
          - maya-version: "2023"
            python-version: "3.9"
          - maya-version: "2022"
            python-version: "3.7"

    container:
      image: tahv/mayapy:${{ matrix.maya-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Maya standalone
        run: |
          mayapy -c "
          import maya.standalone
          maya.standalone.initialize()
          import sys
          from maya import cmds
          print('Maya version:', cmds.about(version=True))
          print('Python version:', sys.version)
          "

      - name: Install package into mayapy
        run: |
          # Install into mayapy's site-packages so E2E tests can import dcc_mcp_maya
          mayapy -m pip install --upgrade pip
          mayapy -m pip install -e ".[dev]"

      - name: Setup Node.js for mcporter
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run unit tests (no Maya required)
        run: mayapy -m pytest tests/ -v --tb=short -m "not e2e"

      - name: Run E2E tests (Maya standalone)
        run: |
          mayapy -c "
          import maya.standalone
          maya.standalone.initialize()

          import sys, subprocess, os
          # Run e2e tests via pytest inside mayapy
          result = subprocess.run(
              [sys.executable, '-m', 'pytest', 'tests/', '-v', '--tb=short', '-m', 'e2e'],
              env=dict(os.environ),
          )
          sys.exit(result.returncode)
          "

      - name: Test MCP connectivity with mcporter
        run: |
          # Start Maya MCP server in background (standalone mode, port 7891)
          mayapy -c "
          import maya.standalone
          maya.standalone.initialize()
          import dcc_mcp_maya, time
          handle = dcc_mcp_maya.start_server(port=7891)
          print('MCP server running at:', handle.mcp_url())
          # Keep process alive while mcporter tests run
          time.sleep(60)
          dcc_mcp_maya.stop_server()
          " &
          SERVER_PID=$!

          # Wait for server to be ready
          sleep 10

          # Verify server is reachable
          curl -sf -X POST http://127.0.0.1:7891/mcp \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":0,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' \
            | python -c "import sys,json; d=json.load(sys.stdin); assert d['result']['serverInfo']['name']=='maya-mcp', d"
          echo "MCP initialize: OK"

          # List Maya tools via mcporter
          npx --yes mcporter list \
            --http-url http://127.0.0.1:7891/mcp \
            --name maya-ci

          # Call get_session_info tool
          npx mcporter call \
            --http-url http://127.0.0.1:7891/mcp \
            "maya-ci.maya_scene__get_session_info()"

          # Call create_sphere tool
          npx mcporter call \
            --http-url http://127.0.0.1:7891/mcp \
            "maya-ci.maya_primitives__create_sphere(radius=2.0, name='mcporterSphere')"

          # Call execute_python tool
          npx mcporter call \
            --http-url http://127.0.0.1:7891/mcp \
            "maya-ci.maya_scripting__execute_python(code=\"import maya.cmds as cmds; cmds.polyCube(n='mcporterCube')\")"

          kill $SERVER_PID 2>/dev/null || true
          echo "mcporter connectivity tests: PASSED"
