tools:
- name: capture_viewport
  description: Capture the active Maya viewport as a base64 PNG. Works when Maya is
    minimized or in batch mode (auto-falls back to off-screen rendering — issue
  execution: async
  affinity: main
  timeout_hint_secs: 600
  group: rendering
  inputSchema:
    type: object
    properties:
      width:
        type: integer
        minimum: 1
        default: 1920
      height:
        type: integer
        minimum: 1
        default: 1080
      frame:
        type: number
        description: Frame to capture; defaults to current frame.
      off_screen:
        type: boolean
        description: Force off-screen capture. Auto-enabled in batch mode and when
          no model panel is visible.
- name: export_selection
  execution: async
  affinity: main
  timeout_hint_secs: 300
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: rendering
  description: Export the current selection in the current Maya scene.
- name: get_render_settings
  description: Query current render settings
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: rendering
- name: get_scene_render_stats
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: rendering
  description: Get scene render statistics without modifying the Maya scene.
- name: import_file
  execution: async
  affinity: main
  timeout_hint_secs: 300
  group: rendering
  description: Import a scene file in the current Maya scene.
- name: playblast
  description: Capture a viewport screenshot as a base64-encoded PNG
  execution: async
  affinity: main
  timeout_hint_secs: 600
  group: rendering
- name: set_render_quality
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: rendering
  description: Set render quality settings in the current Maya scene.
- name: set_render_settings
  description: Set render parameters (resolution, frame range, renderer, image format)
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: rendering
