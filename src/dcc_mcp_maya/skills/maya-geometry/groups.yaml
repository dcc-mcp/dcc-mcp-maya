groups:
- name: core
  description: Pure filesystem geometry helpers — never touches maya.cmds.
  default_active: true
  tools:
  - file_exists
- name: geometry
  description: Maya scene save and FBX / OBJ interchange tools (main-thread).
  default_active: true
  tools:
  - save_scene
  - export_fbx
  - import_fbx
  - export_obj
