tools:
- name: import_to_scene
  description: Import an asset into the current Maya scene from a typed AssetDescriptor.
  execution: sync
  affinity: main
  annotations:
    destructive_hint: true
  group: import
  input_schema:
    type: object
    required:
    - descriptor
    properties:
      descriptor:
        type: object
        required:
        - asset_id
        - variants
        properties:
          asset_id:
            type: string
          variants:
            type: array
            items:
              type: object
              required:
              - local_path
              properties:
                local_path:
                  type: string
                format:
                  type: string
                  enum:
                  - FBX
                  - OBJ
                  - USD
                  - USDZ
                  - GLTF
                  - GLB
                  - ABC
                  - UNKNOWN
                preferred:
                  type: boolean
      material_mode:
        type: string
        enum:
        - as_authored
        - default_gray
        - skip
      placement:
        type: object
        properties:
          translate:
            type: array
            items:
              type: number
          rotate:
            type: array
            items:
              type: number
          scale:
            type: array
            items:
              type: number
          parent_name:
            type: string
      target_collection:
        type: string
      skip_existing:
        type: boolean
      extra:
        type: object
