tools:
- name: import_to_scene
  description: |-
    Import an asset into the current Maya scene from a typed
    AssetDescriptor.  Dispatches to the appropriate importer per
    AssetFormat, applies material mode (as_authored / default_gray /
    skip), optional placement hints (translate / rotate / scale /
    parent), and skip-existing dedup by asset_id.  Returns
    ImportToSceneResult with the imported node list and any warnings.
    Loads the required Maya plug-in(s) automatically.
  execution: async
  affinity: main
  timeout_hint_secs: 300
  annotations:
    destructive_hint: true
  group: import
  input_schema:
    type: object
    required:
    - descriptor
    properties:
      descriptor:
        type: object
        required:
        - asset_id
        - variants
        properties:
          asset_id:
            type: string
          variants:
            type: array
            items:
              type: object
              required:
              - local_path
              properties:
                local_path:
                  type: string
                format:
                  type: string
                  enum:
                  - FBX
                  - OBJ
                  - USD
                  - USDZ
                  - GLTF
                  - GLB
                  - ABC
                  - UNKNOWN
                  default: UNKNOWN
                preferred:
                  type: boolean
                  default: false
                mime:
                  type: string
          attribution:
            type: object
            properties:
              author:
                type: string
              source:
                type: string
              created_at:
                type: string
          preview:
            type: string
          unit_hint:
            type: string
            default: unitless
          meters_per_unit:
            type: number
            default: 1.0
          up_axis:
            type: string
            default: y
            enum:
            - x
            - y
            - z
          tags:
            type: array
            items:
              type: string
          extra:
            type: object
      material_mode:
        type: string
        enum:
        - as_authored
        - default_gray
        - skip
        default: as_authored
      placement:
        type: object
        properties:
          translate:
            type: array
            items:
              type: number
            minItems: 3
            maxItems: 3
          rotate:
            type: array
            items:
              type: number
            minItems: 3
            maxItems: 3
          scale:
            type: array
            items:
              type: number
            minItems: 3
            maxItems: 3
          parent_name:
            type: string
      target_collection:
        type: string
      skip_existing:
        type: boolean
        default: false
      extra:
        type: object
