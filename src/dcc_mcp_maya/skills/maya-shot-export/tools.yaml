tools:
- name: export_camera
  execution: async
  affinity: main
  timeout_hint_secs: 300
  annotations:
    read_only_hint: true
    idempotent_hint: true
  description: Export a camera in the current Maya scene.
- name: export_shot_alembic
  execution: async
  affinity: main
  timeout_hint_secs: 300
  annotations:
    read_only_hint: true
    idempotent_hint: true
  description: Export shot Alembic data in the current Maya scene.
- name: export_shot_fbx
  execution: async
  affinity: main
  timeout_hint_secs: 300
  annotations:
    read_only_hint: true
    idempotent_hint: true
  description: Export shot FBX data in the current Maya scene.
- name: get_shot_info
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  description: Get shot information without modifying the Maya scene.
