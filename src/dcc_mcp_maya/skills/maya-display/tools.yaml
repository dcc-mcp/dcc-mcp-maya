tools:
- name: create_display_layer
  execution: sync
  affinity: main
  group: scene-management
  description: Create a display layer in the current Maya scene.
  input_schema:
    type: object
    properties:
      name:
        type: string
      objects:
        oneOf:
        - type: string
        - type: array
          items:
            type: string
          minItems: 1
      visibility:
        type: boolean
        default: true
- name: delete_display_layer
  execution: sync
  affinity: main
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: scene-management
  description: Delete a display layer in the current Maya scene.
  input_schema:
    type: object
    properties:
      layer_name:
        type: string
      remove_objects:
        type: boolean
        default: false
    required:
    - layer_name
- name: list_display_layers
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: scene-management
  description: List display layers without modifying the Maya scene.
  input_schema:
    type: object
    additionalProperties: false
- name: set_display_layer
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: scene-management
  description: Set a display layer in the current Maya scene.
  input_schema:
    type: object
    properties:
      layer_name:
        type: string
      objects:
        oneOf:
        - type: string
        - type: array
          items:
            type: string
          minItems: 1
    required:
    - layer_name
    - objects
