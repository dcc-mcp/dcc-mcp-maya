tools:
- name: generate_procedural_house_showcase
  description: Stage four seeded Bifrost house styles with materials, a camera orbit,
    and reveal animation for viewport capture.
  execution: async
  affinity: main
  timeout_hint_secs: 600
  annotations:
    read_only_hint: false
    idempotent_hint: false
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log
  group: generators
  input_schema:
    type: object
    properties:
      seed:
        type: integer
        minimum: 0
        maximum: 2147483647
        description: Base seed; the four houses use consecutive reproducible seeds.
      name:
        type: string
        description: Maya-safe base name for the showcase hierarchy.
      position:
        type: array
        minItems: 3
        maxItems: 3
        items:
          type: number
        description: World-space XYZ centre for the showcase.
      spacing:
        type: number
        minimum: 6
        maximum: 30
        default: 9
      frame_count:
        type: integer
        minimum: 24
        maximum: 240
        default: 72
      replace:
        type: boolean
        default: true
- name: generate_procedural_house
  description: Generate a deterministic random-style house as an evaluated Bifrost mesh
    graph.
  execution: async
  affinity: main
  timeout_hint_secs: 600
  annotations:
    read_only_hint: false
    idempotent_hint: false
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log
  group: generators
  input_schema:
    type: object
    properties:
      seed:
        type: integer
        minimum: 0
        maximum: 2147483647
        description: Reuse the returned seed to reproduce the same house.
      style:
        type: string
        enum:
        - random
        - cabin
        - cottage
        - modern
        - townhouse
        default: random
      name:
        type: string
        description: Maya-safe base name; invalid characters are normalized.
      position:
        type: array
        minItems: 3
        maxItems: 3
        items:
          type: number
        description: World-space XYZ origin for the generated house.
- name: list_bifrost_graphs
  description: List Bifrost graph shapes and boards with optional node and port details.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: graph
  input_schema:
    type: object
    properties:
      include_nodes:
        type: boolean
        default: true
      include_ports:
        type: boolean
        default: false
- name: create_bifrost_graph
  description: Create an empty Bifrost graph shape or board in the current Maya scene.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: false
    idempotent_hint: false
  group: graph
  input_schema:
    type: object
    properties:
      name:
        type: string
      kind:
        type: string
        enum:
        - graph_shape
        - board
        default: graph_shape
- name: add_bifrost_node
  description: Add a fully-qualified Bifrost node to an existing graph or compound.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: false
    idempotent_hint: false
  group: graph
  input_schema:
    type: object
    required:
    - graph
    - node_type
    properties:
      graph:
        type: string
      node_type:
        type: string
        description: Fully-qualified type such as Modeling::Primitive::create_mesh_cube.
      name:
        type: string
      compound:
        type: string
        default: .
- name: connect_bifrost_ports
  description: Connect or disconnect two absolute-from-root ports in a Bifrost graph.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: false
    idempotent_hint: true
  group: graph
  input_schema:
    type: object
    required:
    - graph
    - source_port
    - destination_port
    properties:
      graph:
        type: string
      source_port:
        type: string
        description: Source path such as .cube.cube_mesh.
      destination_port:
        type: string
        description: Destination path such as .output.geometry.
      disconnect:
        type: boolean
        default: false
      copy_metadata:
        type: boolean
        default: false
- name: create_bifrost_port
  description: Create a dynamic input or output port on a compatible Bifrost node.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: false
    idempotent_hint: false
  group: graph
  input_schema:
    type: object
    required:
    - graph
    - node
    - port
    - data_type
    properties:
      graph:
        type: string
      node:
        type: string
      port:
        type: string
      data_type:
        type: string
        description: Bifrost type such as Object, float, or array<Object>.
      direction:
        type: string
        enum:
        - input
        - output
        default: input
- name: set_bifrost_property
  description: Set an unconnected Bifrost node input port default from a JSON-compatible
    value.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: false
    idempotent_hint: true
  group: graph
  input_schema:
    type: object
    required:
    - graph
    - node
    - port
    - value
    properties:
      graph:
        type: string
      node:
        type: string
      port:
        type: string
      value:
        oneOf:
        - type: string
        - type: number
        - type: boolean
        - type: array
          items:
            oneOf:
            - type: string
            - type: number
            - type: boolean
