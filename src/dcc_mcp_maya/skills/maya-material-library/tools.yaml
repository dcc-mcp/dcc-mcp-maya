tools:
- name: delete_material_preset
  execution: sync
  affinity: main
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: shading-lighting
  description: Delete a material preset in the current Maya scene.
- name: list_materials
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: shading-lighting
  description: List materials without modifying the Maya scene.
- name: load_material
  execution: sync
  affinity: main
  group: shading-lighting
  description: Load a material in the current Maya scene.
- name: save_material
  execution: sync
  affinity: main
  group: shading-lighting
  description: Save a material in the current Maya scene.
